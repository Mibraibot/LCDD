<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>ESP32 2.4GHz Spectrum</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    text-align:center;
}

.container{
    width:95%;
    margin:auto;
}

canvas{
    background:#111827;
    border-radius:10px;
}

h1{
    margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>ESP32 NRF24 Spectrum Analyzer</h1>

<p>Realtime 2.4GHz RF Activity (125 Channels)</p>

<canvas id="chart"></canvas>

</div>

<script>

const ctx = document.getElementById('chart');

let chart = new Chart(ctx,{

    type:'bar',

    data:{
        labels:Array.from({length:125},(_,i)=>i),

        datasets:[{
            label:"RF Activity",
            data:new Array(125).fill(0),
            borderWidth:1
        }]
    },

    options:{
        animation:false,
        responsive:true,
        scales:{
            y:{
                beginAtZero:true
            },
            x:{
                ticks:{
                    maxTicksLimit:25
                }
            }
        }
    }

});

async function updateSpectrum(){

    try{

        const response = await fetch("/spectrum");
        const data = await response.json();

        if(data.channels){

            chart.data.datasets[0].data = data.channels;
            chart.update();

        }

    }catch(e){
        console.log(e)
    }

}

setInterval(updateSpectrum,200);

</script>

</body>

</html>
